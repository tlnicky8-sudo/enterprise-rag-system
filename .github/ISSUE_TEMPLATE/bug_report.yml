name: Bug Report
description: 报告缺陷或异常行为
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        提交前请确认未在 `.env` 或日志中粘贴 API Key 等敏感信息。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清楚描述发生了什么
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 列出复现命令或操作步骤
      placeholder: |
        1. python setup_data.py
        2. python web_app.py
        3. 提问「……」
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Python 版本
      placeholder: "3.11"

  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: 可粘贴 `logs/app.log` 中的关键片段
