# Copy this file to config.ini and adjust values for your local environment.
# Runtime switches (retrieval thresholds, FAQ, grounding, prompts) are in config/runtime.yaml

[redis]
host = localhost
port = 6379
password =
db = 0

[milvus]
host = localhost
port = 19530
database_name = labor_law
collection_name = labor_law_rag

[llm]
model = deepseek-v4-pro

[retrieval]
parent_chunk_size = 1200
child_chunk_size = 300
chunk_overlap = 50
retrieval_k = 5
candidate_m = 2

[logger]
log_file = logs/app.log

[app]
valid_sources = ["labor_law"]
customer_service_phone = 12345678

[models]
bge_m3_path = models/bge-m3
bge_reranker_path = models/bge-reranker-large
bert_classifier_path = models/bert_outputs
bert_base_path = models/bert-base-chinese

[domain]
name = labor_law
display_name = 劳动法

# 以下段落为兼容旧配置；推荐迁移到 config/runtime.yaml
[faq]
semantic_threshold = 0.92
bm25_threshold = 0.85
bm25_min_score = 0.1
cache_ttl = 86400
cache_write_threshold = 0.8
rerank_weight = 0.6
llm_weight = 0.4

[grounding]
require_context_for_legal_qa = true
min_rerank_score = 0.35
